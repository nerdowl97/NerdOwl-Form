<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NerdOwl | Give Your Book a New Home</title>
    <link rel="icon" type="image/png" href="Favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #1a2a40;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 50px 20px;
        }
        #star-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .form-container {
            background: linear-gradient(135deg, #feefd2 0%, #fdf2e0 100%);
            border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            width: 100%; max-width: 650px; padding: 40px; border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative; z-index: 10;
        }
        .logo-section { text-align: center; margin-bottom: 25px; }
        .logo-img { width: 150px; height: auto; margin: 0 auto; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        .input-group { margin-bottom: 18px; }
        .label { display: block; font-weight: 600; margin-bottom: 6px; color: #2a4160; font-size: 0.95rem; }
        .input-field {
            width: 100%; padding: 12px 16px; background-color: rgba(255, 255, 255, 0.6);
            border: 2px solid #6d88ac; border-radius: 10px; outline: none; color: #1a2a40;
        }
        .input-field:focus { background-color: #ffffff; border-color: #2a4160; }
        .checkbox-group {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px; background: rgba(254, 247, 232, 0.8); padding: 15px; border-radius: 10px; border: 1px solid #6d88ac;
        }
        .checkbox-item { display: flex; align-items: center; cursor: pointer; font-size: 0.9rem; color: #2a4160; }
        .submit-btn {
            background: #2a4160; color: #feefd2; width: 100%; padding: 16px; border-radius: 10px;
            font-weight: 700; font-size: 1.1rem; margin-top: 25px; transition: all 0.3s;
        }
        #other-genre-container { display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <canvas id="star-canvas"></canvas>

    <div class="form-container">
        <div class="logo-section">
            <img src="logo.png" alt="NerdOwl Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/150?text=NerdOwl'">
            <p class="text-slate-600 font-medium mt-2 uppercase tracking-widest text-[10px]">A magical space where books find their readers</p>
        </div>

        <form id="bookForm">
            <div class="input-group">
                <label class="label">Upload Book Cover</label>
                <div class="border-2 border-dashed border-[#6d88ac] p-5 text-center rounded-xl cursor-pointer bg-white/40" onclick="document.getElementById('bookCover').click()">
                    <span id="file-name" class="text-slate-500 text-sm">Drop your image here or click to browse</span>
                    <input type="file" id="bookCover" accept="image/*" class="hidden" onchange="updateFileName(this)">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="input-group">
                    <label class="label">Book Title</label>
                    <input type="text" id="bookTitle" class="input-field" placeholder="Enter title" required>
                </div>
                <div class="input-group">
                    <label class="label">Author Name</label>
                    <input type="text" id="authorName" class="input-field" placeholder="Enter author" required>
                </div>
            </div>

            <div class="input-group">
                <label class="label">Book Categories</label>
                <div class="checkbox-group">
                    <label class="checkbox-item"><input type="checkbox" name="genre" value="Fiction" class="mr-2"> Fiction</label>
                    <label class="checkbox-item"><input type="checkbox" name="genre" value="Non-Fiction" class="mr-2"> Non-Fiction</label>
                    <label class="checkbox-item"><input type="checkbox" name="genre" value="Psychology" class="mr-2"> Psychology</label>
                    <label class="checkbox-item"><input type="checkbox" name="genre" value="Business" class="mr-2"> Business</label>
                    <label class="checkbox-item"><input type="checkbox" name="genre" value="Self-Help" class="mr-2"> Self-Help</label>
                    <label class="checkbox-item"><input type="checkbox" name="genre" value="Other" id="other-checkbox" class="mr-2"> Other...</label>
                </div>
                <div id="other-genre-container">
                    <input type="text" id="other-genre-input" class="input-field" placeholder="Please specify the genre">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="input-group">
                    <label class="label">Number of Pages</label>
                    <input type="number" id="totalPages" class="input-field" placeholder="Total pages" required>
                </div>
                <div class="input-group">
                    <label class="label">Price / Day (QAR)</label>
                    <input type="number" step="0.01" id="pricePerDay" class="input-field" placeholder="0.00" required>
                </div>
            </div>

            <div class="input-group">
                <label class="label">Book Condition</label>
                <select id="bookCondition" class="input-field" required>
                    <option value="" disabled selected>How's your book's health?</option>
                    <option value="Excellent">Excellent - Like New</option>
                    <option value="Good">Good - Well Maintained</option>
                    <option value="Fair">Fair - Used</option>
                    <option value="Poor">Poor - Readable but Worn</option>
                </select>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="input-group">
                    <label class="label">WhatsApp Number</label>
                    <input type="tel" id="whatsappNumber" class="input-field" 
                           placeholder="01xxxxxxxxx" 
                           pattern="[0-9]{11}" 
                           title="Please enter exactly 11 digits" 
                           maxlength="11" 
                           oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                           required>
                </div>
                <div class="input-group">
                    <label class="label">Instagram Username</label>
                    <input type="text" id="instagramUser" class="input-field" placeholder="@username" required>
                </div>
            </div>

            <button type="submit" class="submit-btn">Add to NerdOwl Library</button>
        </form>
    </div>

    <footer style="margin-top: 30px; text-align: center; padding-bottom: 40px; position: relative; z-index: 10;">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
            <img src="logo.png" alt="" style="width: 40px; opacity: 0.8;" onerror="this.style.display='none'">
            <a href="https://www.instagram.com/nerd.owl97" target="_blank" style="color: #feefd2; text-decoration: none; font-size: 14px;">Follow the Nest</a>
            <p style="color: rgba(254, 239, 210, 0.5); font-size: 9px; letter-spacing: 2px;">© 2026 NERDOWL COMMUNITY</p>
        </div>
    </footer>

    <script>
        // Stars Logic
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initStars(); }
        function initStars() {
            stars = [];
            const count = Math.floor((canvas.width * canvas.height) / 3000);
            for(let i=0; i<count; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, radius:Math.random()*1.5, opacity:Math.random(), speed:Math.random()*0.02});
        }
        function drawStars() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle="white";
            stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x,s.y,s.radius,0,Math.PI*2); ctx.globalAlpha=s.opacity; ctx.fill(); s.opacity+=s.speed; if(s.opacity>1||s.opacity<0) s.speed*=-1; });
            requestAnimationFrame(drawStars);
        }
        window.addEventListener('resize', resize); resize(); drawStars();

        // UI Logic
        function updateFileName(input) { document.getElementById('file-name').innerText = input.files[0] ? input.files[0].name : "Browse image"; }
        
        const otherCheckbox = document.getElementById('other-checkbox');
        const otherContainer = document.getElementById('other-genre-container');
        otherCheckbox.addEventListener('change', function() { otherContainer.style.display = this.checked ? 'block' : 'none'; });

        // Form Submit
        document.getElementById('bookForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const file = document.getElementById('bookCover').files[0];
            
            let selectedGenres = Array.from(document.querySelectorAll('input[name="genre"]:checked')).map(cb => cb.value);
            if (selectedGenres.includes('Other')) {
                const val = document.getElementById('other-genre-input').value;
                if(val) selectedGenres[selectedGenres.indexOf('Other')] = val;
            }

            btn.innerText = "Connecting to Nest...";
            btn.disabled = true;

            const sendData = (base64Image = null) => {
                const finalData = {
                    title: document.getElementById('bookTitle').value,
                    author: document.getElementById('authorName').value,
                    categories: selectedGenres,
                    pages: document.getElementById('totalPages').value,
                    price: document.getElementById('pricePerDay').value,
                    condition: document.getElementById('bookCondition').value,
                    whatsapp: document.getElementById('whatsappNumber').value,
                    instagram: document.getElementById('instagramUser').value,
                    imageName: file ? file.name : null,
                    imageFile: base64Image
                };

                // استبدلي الرابط التالي برابط الـ Deployment الجديد (الذي ينتهي بـ /exec)
                const scriptURL = 'https://script.google.com/macros/s/AKfycbzZchHUW22YxNTWzEVs1JpTJhoOixK86B9aCuV4dvsDjaoOcEdp-HPRVxCn18Kce5HN/exec';

                fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors', // جربي إزالتها إذا استمرت المشكلة، لكنها ضرورية لجوجل
                    body: JSON.stringify(finalData),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                })
                .then(() => {
                    alert("Success! Book added to Library.");
                    location.reload(); // لإعادة تعيين كل شيء
                })
                .catch(() => {
                    alert("Submission received (check your sheet).");
                    btn.disabled = false;
                });
            };

            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => sendData(ev.target.result);
                reader.readAsDataURL(file);
            } else { sendData(); }
        });
    </script>
</body>
</html>
